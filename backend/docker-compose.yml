version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sara-db
    environment:
      POSTGRES_DB: smartradiology
      POSTGRES_USER: django
      POSTGRES_PASSWORD: djangopass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: sara-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_mock_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://django:djangopass@db:5432/smartradiology
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
